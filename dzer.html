<!DOCTYPE html>
<html>
    <head>
    <meta charset="UTF-8">
    <title>dzer</title>
</head>

<body>
<script>
function maksa(){
	let dz = document.getElementsByName('drink');
    for(i = 0; i < dz.length; i++) {
       if(dz[i].checked)
      	document.getElementById("cena").innerHTML=dz[i].value;
	}
 }   
</script>
<p>Izvēlies dzērienu:</p>
<form>
  <input type="radio" id="kafija" name="drink" value="3.60">
  <label for="kafija">kafija</label><br>
  <input type="radio" id="sula" name="drink" value="2.50">
  <label for="sula">sula</label><br>
  <input type="radio" id="kakao" name="drink" value="3.20">
  <label for="kakao">kakao</label><br><br>
  <input type="button" id="poga" value="jāmaksā" onclick="maksa()">  <label id="cena">izvēlies un nospied pogu</label>
</form> 
<div class="w3-container" style="padding: 10px 0;">
  <a href="index.html" class="w3-button w3-black w3-round-large">« Atpakaļ uz sākumu</a>
</div>
</body>
</html>
